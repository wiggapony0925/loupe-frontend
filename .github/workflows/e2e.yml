name: e2e (Maestro)

# Runs the Maestro `smoke` flow on an Android emulator: prebuild → debug APK →
# install → run. Kept SEPARATE from frontend-ci.yml so the fast typecheck/lint/
# test gate never waits on an emulator. Heavy (~15-25 min), so it's opt-in:
# manual dispatch + only when app/native/flow files change.
#
# NOTE: this builds a real Android app in CI (Expo prebuild + Gradle), which is
# environment-sensitive — expect to tune the APK path / api-level on first run.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "app/**"
      - "src/**"
      - ".maestro/**"
      - "package.json"
      - ".github/workflows/e2e.yml"

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Maestro smoke (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate set-logo registry
        run: node scripts/generate-set-logo-registry.mjs || true

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Prebuild (Android)
        run: npx expo prebuild -p android --no-install

      - name: Build debug APK
        run: ./android/gradlew -p android assembleDebug

      - name: Enable KVM (faster emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run smoke flow on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            maestro test .maestro --include-tags=smoke --format junit --output maestro-report.xml

      - name: Upload Maestro report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report
          path: maestro-report.xml
          if-no-files-found: ignore
